<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} — JARVIS Report</title>
<style>
  :root {
    --bg: #0e0e11; --surface: #18181b; --border: #2a2a3e;
    --text: #e8e8f0; --dim: #a1a1aa; --accent: #93c5fd;
    --mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    max-width: 900px; margin: 0 auto; padding: 40px 24px 60px;
    line-height: 1.65; -webkit-font-smoothing: antialiased;
  }
  header { margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 8px; }
  header .meta { font-size: 12px; color: var(--dim); letter-spacing: 0.04em; }
  header .badge {
    display: inline-block; background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 2px 8px; font-size: 11px; color: var(--accent);
    letter-spacing: 0.06em; margin-left: 8px;
  }
  section { margin-bottom: 28px; }
  h2 {
    font-size: 1.15rem; font-weight: 600; color: #fff;
    margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  p { margin-bottom: 10px; font-size: 14px; color: var(--text); }
  pre {
    background: #1a1a2e; border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; overflow-x: auto; font-family: var(--mono);
    font-size: 13px; line-height: 1.5; margin: 10px 0; color: #c9d1d9;
  }
  code {
    background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 4px;
    font-family: var(--mono); font-size: 13px;
  }
  pre code { background: none; padding: 0; }
  ul, ol { margin: 8px 0; padding-left: 20px; }
  li { margin: 4px 0; font-size: 14px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  table { border-collapse: collapse; width: 100%; margin: 10px 0; }
  th, td { border: 1px solid var(--border); padding: 8px 12px; font-size: 13px; text-align: left; }
  th { background: var(--surface); font-weight: 600; }
  .research-data {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; margin-top: 12px;
  }
  .research-data h2 { border-color: #3b82f6; }
  footer {
    margin-top: 40px; padding-top: 16px; border-top: 1px solid var(--border);
    font-size: 11px; color: #52525b; text-align: center; letter-spacing: 0.04em;
  }
  @media print {
    body { background: #fff; color: #1a1a1a; }
    pre { background: #f5f5f5; border-color: #ddd; color: #1a1a1a; }
    th { background: #f0f0f0; }
    header, footer { border-color: #ddd; }
    h2 { border-color: #ddd; }
  }
</style>
</head>
<body>
  <header>
    <h1>{{ title }}<span class="badge">JARVIS</span></h1>
    <div class="meta">Generated {{ generated_at }}</div>
  </header>

  {% for section in sections %}
  <section>
    <h2>{{ section.heading }}</h2>
    <p>{{ section.content | replace("\n", "<br>") }}</p>
  </section>
  {% endfor %}

  {% if research_data %}
  <div class="research-data">
    <h2>Research Data</h2>
    <pre>{{ research_data }}</pre>
  </div>
  {% endif %}

  <footer>JARVIS — Proactive Developer Intelligence Layer</footer>
</body>
</html>
